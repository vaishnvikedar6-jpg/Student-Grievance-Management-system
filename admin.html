<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | SGMS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { background: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .logout-btn { background: #e74c3c; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; background: white; border-collapse: collapse; margin-top: 25px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th { background: #34495e; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .Pending { background: #fff3cd; color: #856404; }
        .Resolved { background: #d4edda; color: #155724; }
        
        .action-btn { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .res-btn { background: #2ecc71; color: white; margin-right: 5px; }
        .del-btn { background: #bdc3c7; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Student Grievances</h1>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <table id="grievanceTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Student (PRN)</th>
                <th>Issue</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableContent">
            </tbody>
    </table>
</div>

<script>
    // 1. SECURITY CHECK: Run immediately
    if (sessionStorage.getItem("adminAuthenticated") !== "true") {
        window.location.href = "admin.html";
    }

    // 2. LOGOUT FUNCTION
    function logout() {
        sessionStorage.removeItem("adminAuthenticated");
        window.location.href = "admin-login.html";
    }

    // 3. LOAD DATA
    function renderTable() {
        const grievances = JSON.parse(localStorage.getItem('grievances')) || [];
        const tbody = document.getElementById('tableContent');
        tbody.innerHTML = "";

        grievances.forEach(item => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.date}</td>
                    <td><strong>${item.name}</strong><br><small>${item.prn}</small></td>
                    <td>${item.text}</td>
                    <td><span class="status-pill ${item.status}">${item.status}</span></td>
                    <td>
                        ${item.status === 'Pending' ? `<button class="action-btn res-btn" onclick="resolveIssue(${item.id})">Resolve</button>` : ''}
                        <button class="action-btn del-btn" onclick="deleteIssue(${item.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    function resolveIssue(id) {
        let list = JSON.parse(localStorage.getItem('grievances'));
        list = list.map(g => g.id === id ? {...g, status: 'Resolved'} : g);
        localStorage.setItem('grievances', JSON.stringify(list));
        renderTable();
    }

    function deleteIssue(id) {
        if(confirm("Confirm deletion?")) {
            let list = JSON.parse(localStorage.getItem('grievances'));
            list = list.filter(g => g.id !== id);
            localStorage.setItem('grievances', JSON.stringify(list));
            renderTable();
        }
    }

    window.onload = renderTable;
</script>

</body>
</html>
