<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | SGMS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3498db; }
        .login-btn { width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .login-btn:hover { background: #2980b9; }
        .error { color: #e74c3c; font-size: 14px; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Admin Login</h2>
    <div id="errorMessage" class="error">Incorrect Username or Password!</div>
    <input type="text" id="username" placeholder="Username (admin)">
    <input type="password" id="password" placeholder="Password (1234)">
    <button onclick="handleLogin()" class="login-btn">Login</button>
</div>

<script>
    function handleLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // AUTHENTICATION LOGIC
        if (user === "admin" && pass === "1234") {
            // Create the session pass
            sessionStorage.setItem("adminAuthenticated", "true");
            // Redirect to Dashboard
            window.location.href = "admin.html";
        } else {
            document.getElementById('errorMessage').style.display = "block";
        }
    }
</script>

</body>
</html>
