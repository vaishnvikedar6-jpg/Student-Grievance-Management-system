<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SGMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #4c1d95;
            --soft-purple: #a78bfa;
            --white: rgba(255, 255, 255, 0.9);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            /* Same gradient as the student page */
            background: linear-gradient(135deg, rgba(76, 29, 149, 0.8), rgba(219, 39, 119, 0.7));
            background-size: cover;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .card { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; 
            border-radius: 35px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        h2 { 
            margin: 0 0 10px 0; 
            font-size: 28px; 
            font-weight: 800; 
            color: var(--deep-purple);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #5b21b6;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
            opacity: 0.7;
        }

        .form-group { margin-bottom: 20px; text-align: left; }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 13px;
            color: var(--deep-purple);
            margin-left: 5px;
        }

        input { 
            width: 100%; 
            padding: 14px 18px; 
            border: 1px solid rgba(167, 139, 250, 0.3); 
            border-radius: 18px; 
            box-sizing: border-box; 
            font-size: 15px;
            background: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus { 
            border-color: var(--soft-purple);
            box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.2);
            background: #fff;
        }

        .login-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #7c3aed, #db2777); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 18px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 700; 
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3);
            margin-top: 10px;
        }

        .login-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -5px rgba(124, 58, 237, 0.4);
            filter: brightness(1.1);
        }

        .error { 
            background: #ffe4e6;
            color: #be123c;
            padding: 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(190, 18, 60, 0.1);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--deep-purple);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            opacity: 0.6;
        }
        .back-link:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>Staff Portal</h2>
            <p class="subtitle">Secure login for administration</p>
            
            <div id="errorMessage" class="error">Oops! Invalid credentials.</div>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter admin username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <button onclick="handleLogin()" class="login-btn">Access Dashboard</button>
            
            <a href="index.html" class="back-link">← Return to Student Form</a>
        </div>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === "admin" && pass === "1234") {
                sessionStorage.setItem("adminAuthenticated", "true");
                window.location.href = "admin.html"; // खात्री करा की तुमची फाईल 'admin.html' याच नावाने आहे.
            } else {
                const errorBox = document.getElementById('errorMessage');
                errorBox.style.display = "block";
                // Shake effect for error
                errorBox.style.animation = "shake 0.4s ease";
            }
        }
    </script>

</body>
</html>
